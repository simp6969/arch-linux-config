# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #

animations {
  enabled = yes

  # --- Unified Smooth Curve (Kept the same) ---
  # A classic, gentle ease-out curve: fast start, smooth stop.
  bezier = fluid, 0.4, 0.7, 0.5, 1 
  
  bezier = liner, 1, 1, 1, 1
  
  
  # Window Animations (Reduced durations)
  animation = windows, 1, 5, fluid, slide # Was 7
  animation = windowsIn, 1, 4, fluid, slide # Was 6
  animation = windowsOut, 1, 3, fluid, slide # Was 5
  animation = windowsMove, 1, 4, fluid, slide # Was 6
  
  # Other Animations
  animation = border, 1, 1, liner # Was 2 (Back to 1 for quick response)
#  animation = borderangle, 1, 180, liner, loop 
  animation = fade, 1, 3, fluid # Was 4
  
  # Workspace Animations (Reduced durations)
  animation = workspaces, 1, 5, fluid # Was 7
  
  # animations for -git or version >0.42.0
  animation = workspacesIn, 1, 4, fluid, slide # Was 6
  animation = workspacesOut, 1, 4, fluid, slide # Was 6
}